<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador Etiqueta Azul</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f2f2f2;
}

button {
    padding: 8px 12px;
    margin-top: 8px;
}

.etiqueta {
    width: 380px;
    border: 2px solid black;
    padding: 20px;
    background: white;
    margin-top: 20px;
}

.logo {
    width: 140px;
    margin-bottom: 10px;
}

.awb {
    font-size: 48px;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}

.sla {
    font-size: 20px;
    margin-top: 10px;
}

.status {
    font-size: 14px;
    margin-top: 10px;
    color: gray;
}

@media print {
    body * {
        visibility: hidden;
    }
    .etiqueta, .etiqueta * {
        visibility: visible;
    }
    .etiqueta {
        position: absolute;
        top: 0;
        left: 0;
    }
}
</style>
</head>

<body>

<h2>Teste OCR - Etiqueta Azul</h2>

<input type="file" id="upload" accept="image/*">
<br>
<button onclick="processar()">Processar Foto</button>
<button onclick="window.print()">Imprimir</button>

<div class="status" id="status"></div>

<div class="etiqueta" id="etiqueta" style="display:none;">

    <!-- LOGO LOCAL -->
    <img class="logo" src="logo-azulcargo.png">

    <div class="awb" id="awbLabel"></div>
    <div class="sla" id="slaLabel"></div>
    <div id="qr" style="margin-top:15px;"></div>

</div>

<script>

function processar() {

    const file = document.getElementById('upload').files[0];
    if (!file) return alert("Selecione uma imagem");

    document.getElementById("status").innerText = "Processando OCR...";

    Tesseract.recognize(
        file,
        'por'
    ).then(({ data: { text } }) => {

        console.log("Texto OCR:", text);

        // Remove quebras e espaços extras
        const texto = text.replace(/\n/g, " ");

        // AWB padrão Azul (577 + 8 dígitos)
        let awbMatch = texto.match(/577\d{8}/);

        // Se não encontrar, tenta 8 dígitos isolados
        if (!awbMatch) {
            awbMatch = texto.match(/\b\d{8}\b/);
        }

        // Data flexível
        const dataMatch = texto.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{2,4}/);

        const awb = awbMatch ? awbMatch[0] : "NÃO IDENTIFICADO";
        const data = dataMatch ? dataMatch[0] : "DATA NÃO IDENTIFICADA";

        document.getElementById("awbLabel").innerText = awb;
        document.getElementById("slaLabel").innerText = "SLA: " + data;

        document.getElementById("etiqueta").style.display = "block";

        document.getElementById("qr").innerHTML = "";

        if (awb !== "NÃO IDENTIFICADO") {
            QRCode.toCanvas(
                document.getElementById("qr"),
                awb
            );
        }

        document.getElementById("status").innerText = "Processamento concluído.";

    }).catch(err => {
        console.error(err);
        document.getElementById("status").innerText = "Erro no OCR.";
    });
}

</script>

</body>
</html>
