<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador 4 Etiquetas - Azul</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

h2 {
    color: #003B73;
}

.botoes {
    margin-top: 15px;
}

.botao {
    display: inline-block;
    padding: 10px 18px;
    margin-right: 10px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    color: white;
}

.galeria {
    background-color: #0056b3;
}

.camera {
    background-color: #28a745;
}

.processar {
    background-color: #ff9800;
}

.imprimir {
    background-color: #6c757d;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 25px;
}

.etiqueta {
    background: white;
    border: 2px solid #003B73;
    border-radius: 8px;
    padding: 15px;
    height: 350px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    width: 130px;
}

.awb {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    color: black;
}

.sla {
    font-size: 18px;
    text-align: center;
    color: #003B73;
}

.qr {
    display: flex;
    justify-content: center;
}

@media print {
    body * {
        visibility: hidden;
    }
    .container, .container * {
        visibility: visible;
    }
    .container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
    }
}

</style>
</head>

<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<div class="botoes">

<label class="botao galeria">
📁 Selecionar da Galeria
<input type="file" id="upload" accept="image/*" multiple style="display:none;">
</label>

<label class="botao camera">
📷 Tirar Foto
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none;">
</label>

<button class="botao processar" onclick="processar()">Processar</button>

<button class="botao imprimir" onclick="window.print()">Imprimir A4</button>

</div>

<div class="container" id="container"></div>

<script>

let imagens = [];

document.getElementById("upload").addEventListener("change", function(e){
    adicionarImagens(e.target.files);
});

document.getElementById("camera").addEventListener("change", function(e){
    adicionarImagens(e.target.files);
});

function adicionarImagens(files) {

    for (let i = 0; i < files.length; i++) {
        if (imagens.length < 4) {
            imagens.push(files[i]);
        }
    }

    alert(imagens.length + " imagem(ns) carregada(s). Máximo 4.");
}

async function processar() {

    if (imagens.length === 0) {
        alert("Nenhuma imagem selecionada.");
        return;
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    for (let i = 0; i < imagens.length; i++) {

        const result = await Tesseract.recognize(imagens[i], 'por');
        const text = result.data.text;

        let numeros = text.replace(/\D/g, "");
        let awbFinal = "NÃO IDENTIFICADO";

        if (numeros.length >= 11) {
            let semPrefixo = numeros.substring(3);
            let ultimos8 = semPrefixo.slice(-8);

            if (ultimos8.length === 7) {
                ultimos8 = "0" + ultimos8;
            }

            awbFinal = ultimos8;
        }

        const dataMatch = text.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{2,4}/);
        const sla = dataMatch ? dataMatch[0] : "DATA NÃO IDENTIFICADA";

        const etiqueta = document.createElement("div");
        etiqueta.className = "etiqueta";

        etiqueta.innerHTML = `
            <img class="logo" src="logo-azulcargo.png">
            <div class="awb">${awbFinal}</div>
            <div class="sla">SLA: ${sla}</div>
            <div class="qr" id="qr${i}"></div>
        `;

        container.appendChild(etiqueta);

        if (awbFinal !== "NÃO IDENTIFICADO") {
            QRCode.toCanvas(
                document.getElementById(`qr${i}`),
                awbFinal,
                { width: 90 }
            );
        }
    }

    imagens = [];
}

</script>

</body>
</html>
