<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Gerador 4 Etiquetas - Azul</title>

<script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

h2{
color:#003B73;
}

.botao{
display:inline-block;
padding:10px 18px;
margin-right:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
border:none;
color:white;
}

.galeria{background:#0056b3;}
.camera{background:#28a745;}
.processar{background:#ff9800;}
.imprimir{background:#6c757d;}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.etiqueta{
background:white;
border:2px solid #003B73;
border-radius:8px;
padding:20px;
height:340px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
width:140px;
margin-bottom:15px;
}

.awb{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.prazo{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
color:#d32f2f;
}

</style>

</head>

<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<label class="botao galeria">
📁 Galeria
<input type="file" id="upload" accept="image/*" multiple style="display:none;">
</label>

<button class="botao processar" onclick="processar()">Processar</button>

<div class="container" id="container"></div>

<script>

let worker;

async function initOCR(){

if(!worker){

worker = await Tesseract.createWorker();

await worker.loadLanguage('eng');
await worker.initialize('eng');

}

}

function extrairAWB(text){

let awbMatch = text.match(/577[0-9]{8,15}/);

if(awbMatch) return awbMatch[0];

return "AWB NÃO IDENTIFICADA";

}

function extrairPrazo(text){

let datas = text.match(/\d{2}\/\d{2}\/\d{4}/g);

if(!datas) return "PRAZO NÃO IDENTIFICADO";

return datas[datas.length-1];

}

function recortarPrazo(img){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let x=0;
let y=img.height*0.45;
let w=img.width*0.4;
let h=img.height*0.25;

const prazoCanvas=document.createElement("canvas");
const pctx=prazoCanvas.getContext("2d");

prazoCanvas.width=w;
prazoCanvas.height=h;

pctx.drawImage(canvas,x,y,w,h,0,0,w,h);

return prazoCanvas;

}

async function processar(){

const arquivos=document.getElementById("upload").files;

if(arquivos.length==0){

alert("Selecione imagens.");
return;

}

await initOCR();

const container=document.getElementById("container");
container.innerHTML="";

for(let i=0;i<arquivos.length && i<4;i++){

const etiqueta=document.createElement("div");
etiqueta.className="etiqueta";
etiqueta.innerHTML="Processando...";
container.appendChild(etiqueta);

const img=new Image();

img.src=URL.createObjectURL(arquivos[i]);

await new Promise(r=>img.onload=r);

try{

// OCR completo
const { data:{ text } } = await worker.recognize(img);

let awbFinal=extrairAWB(text);

// OCR somente área do prazo
let canvasPrazo=recortarPrazo(img);

const { data:{ text: prazoOCR } } = await worker.recognize(canvasPrazo);

let prazoFinal=extrairPrazo(prazoOCR);

etiqueta.innerHTML=`

<img class="logo" src="logo-azulcargo.png">

<div class="awb">${awbFinal}</div>

<div class="prazo">Prazo: ${prazoFinal}</div>

<svg id="barcode${i}"></svg>

`;

JsBarcode(`#barcode${i}`,awbFinal,{
format:"CODE128",
width:4,
height:110,
displayValue:true
});

}catch(e){

etiqueta.innerHTML="Erro OCR";

}

}

}

</script>

</body>
</html>
