<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador 4 Etiquetas - Azul</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
h2 { color:#003B73; }

.botao {
    display:inline-block;
    padding:10px 18px;
    margin-right:10px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    color:white;
}
.galeria{background:#0056b3;}
.camera{background:#28a745;}
.processar{background:#ff9800;}
.imprimir{background:#6c757d;}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:25px;
}

.etiqueta{
    background:white;
    border:2px solid #003B73;
    border-radius:8px;
    padding:15px;
    height:350px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo{width:130px;}
.awb{font-size:42px;font-weight:bold;text-align:center;}
.sla{font-size:20px;text-align:center;color:#003B73;}
.qr{display:flex;justify-content:center;}
.ok{font-size:70px;color:#28a745;text-align:center;}
.erro{font-size:70px;color:red;text-align:center;}

@media print{
 body *{visibility:hidden;}
 .container,.container *{visibility:visible;}
 .container{position:absolute;top:0;left:0;width:100%;}
}
</style>
</head>
<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<label class="botao galeria">
📁 Galeria
<input type="file" id="upload" accept="image/*" multiple style="display:none;">
</label>

<label class="botao camera">
📷 Câmera
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none;">
</label>

<button class="botao processar" onclick="processar()">Processar</button>
<button class="botao imprimir" onclick="window.print()">Imprimir A4</button>

<div class="container" id="container"></div>

<script>

let worker;

async function initWorker(){
    if(!worker){
        worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
    }
}

async function processar(){

    const galeria = document.getElementById("upload").files;
    const camera = document.getElementById("camera").files;
    const arquivos = [...galeria, ...camera];

    if(arquivos.length===0){
        alert("Selecione pelo menos uma imagem.");
        return;
    }

    await initWorker();

    const container=document.getElementById("container");
    container.innerHTML="";

    for(let i=0;i<arquivos.length && i<4;i++){

        const etiqueta=document.createElement("div");
        etiqueta.className="etiqueta";
        etiqueta.innerHTML="<div style='text-align:center'>Processando...</div>";
        container.appendChild(etiqueta);

        try{

            const { data:{ text } } = await worker.recognize(arquivos[i]);

            let numeros=text.replace(/\D/g,"");
            let awbFinal="NÃO IDENTIFICADO";
            let sucesso=false;

            if(numeros.length>=11){
                let semPrefixo=numeros.substring(3);
                let ultimos8=semPrefixo.slice(-8);
                if(ultimos8.length===7){ ultimos8="0"+ultimos8; }
                awbFinal=ultimos8;
                sucesso=true;
            }

            let sla="DATA NÃO IDENTIFICADA";
            const prazoMatch=text.match(/Prazo\s*(\d{2}\/\d{2}\/\d{4})/i);
            if(prazoMatch){ sla=prazoMatch[1]; }

            etiqueta.innerHTML=`
                <img class="logo" src="logo-azulcargo.png">
                <div class="awb">${awbFinal}</div>
                <div class="sla">SLA: ${sla}</div>
                <div class="qr" id="qr${i}"></div>
                <div class="${sucesso?"ok":"erro"}">
                    ${sucesso?"✔":"✖"}
                </div>
            `;

            if(sucesso){
                QRCode.toCanvas(
                    document.getElementById("qr"+i),
                    awbFinal,
                    {width:90}
                );
            }

        }catch(e){
            etiqueta.innerHTML="<div class='erro'>✖</div><div>Erro OCR</div>";
        }
    }

    document.getElementById("upload").value="";
    document.getElementById("camera").value="";
}

</script>
</body>
</html>
