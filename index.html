<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Gerador 4 Etiquetas - Azul</title>

<script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

h2{
color:#003B73;
}

.botao{
display:inline-block;
padding:10px 18px;
margin-right:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
border:none;
color:white;
}

.galeria{background:#0056b3;}
.camera{background:#28a745;}
.processar{background:#ff9800;}
.imprimir{background:#6c757d;}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.etiqueta{
background:white;
border:2px solid #003B73;
border-radius:8px;
padding:20px;
height:340px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
width:140px;
margin-bottom:15px;
}

.awb{
font-size:42px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.motivo{
font-size:32px;
font-weight:bold;
margin:15px 0 20px 0;
width:90%;
padding:14px 16px;
text-align:center;
border:2px solid #003B73;
border-radius:8px;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
background:white;

background-image:url("data:image/svg+xml;utf8,<svg fill='%23003B73' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 15px center;
background-size:20px;
}

.motivo-texto{
display:none;
font-size:34px;
font-weight:bold;
margin:10px 0 18px 0;
text-align:center;
}

.barcode{
margin-top:10px;
}

@media print{

body *{
visibility:hidden;
}

.container,
.container *{
visibility:visible;
}

.container{
position:absolute;
top:0;
left:0;
width:100%;
}

.motivo{
display:none;
}

.motivo-texto{
display:block;
}

}

</style>

</head>

<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<label class="botao galeria">
📁 Galeria
<input type="file" id="upload" accept="image/*" multiple style="display:none;">
</label>

<label class="botao camera">
📷 Câmera
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none;">
</label>

<button class="botao processar" onclick="processar()">Processar</button>

<button class="botao imprimir" onclick="prepararImpressao()">Imprimir A4</button>

<div class="container" id="container"></div>

<script>

let worker;

async function initOCR(){
if(!worker){
worker = await Tesseract.createWorker();
await worker.loadLanguage('eng');
await worker.initialize('eng');
}
}

function extrairAWB(text){
text = text.replace(/\s/g,'');
let awbMatch = text.match(/577\d{8}/);
if(awbMatch){ return awbMatch[0]; }
return "AWB NÃO IDENTIFICADA";
}

async function melhorarImagem(file){

return new Promise(resolve=>{

const img = new Image();
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

img.onload = ()=>{

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
const data = imageData.data;

for(let i=0;i<data.length;i+=4){

let r=data[i], g=data[i+1], b=data[i+2];
let contraste=1.2;

data[i]=((r-128)*contraste)+128;
data[i+1]=((g-128)*contraste)+128;
data[i+2]=((b-128)*contraste)+128;

}

ctx.putImageData(imageData,0,0);
resolve(canvas);

};

img.src = URL.createObjectURL(file);

});

}

async function processar(){

const galeria = document.getElementById("upload").files;
const camera = document.getElementById("camera").files;

const arquivos = [...galeria,...camera];

if(arquivos.length==0){
alert("Selecione imagens.");
return;
}

await initOCR();

const container = document.getElementById("container");
container.innerHTML = "";

for(let i=0;i<arquivos.length && i<4;i++){

const etiqueta = document.createElement("div");
etiqueta.className = "etiqueta";
etiqueta.innerHTML = "Processando...";
container.appendChild(etiqueta);

try{

const imagemMelhorada = await melhorarImagem(arquivos[i]);
const { data:{ text } } = await worker.recognize(imagemMelhorada);

let awbFinal = extrairAWB(text);

etiqueta.innerHTML = `
<img class="logo" src="logo-azulcargo.png">
<div class="awb">${awbFinal}</div>

<select class="motivo" onchange="atualizarMotivo(this)">
<option value="">SELECIONE O MOTIVO</option>

<option>AUSENTE + DE 3 VEZES</option>
<option>ENDERECO NAO LOCALIZADO</option>
<option>CLIENTE DESCONHECIDO</option>
<option>CLIENTE MUDOU-SE</option>
<option>CEP ERRADO</option>
<option>ETIQUETAS DIVERGENTES</option>

<option>RECUSADO</option>
<option>BAIXA ERRONEA</option>
<option>CTE CANCELADO</option>
<option>AVARIA</option>
<option>FALTA VOLUME</option>
<option>AGUARDANDO TROCA DE OFFLOAD</option>
<option>DEVOLUCAO</option>

</select>

<div class="motivo-texto"></div>

<svg class="barcode" id="barcode${i}"></svg>
`;

if(awbFinal !== "AWB NÃO IDENTIFICADA"){
JsBarcode(`#barcode${i}`, awbFinal, {
format:"CODE128",
width:4,
height:110,
margin:20,
displayValue:true,
fontSize:20
});
}

}catch(e){
etiqueta.innerHTML = "Erro OCR";
}

}

document.getElementById("upload").value="";
document.getElementById("camera").value="";

}

function atualizarMotivo(select){
const texto = select.parentElement.querySelector(".motivo-texto");
texto.innerText = select.value;
}

function prepararImpressao(){

document.querySelectorAll(".motivo").forEach(select=>{
const texto = select.parentElement.querySelector(".motivo-texto");
texto.innerText = select.value || "";
});

window.print();

}

</script>

</body>
</html>
