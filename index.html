<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador 4 Etiquetas Azul</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f2f2f2;
}

button {
    padding: 8px 12px;
    margin-top: 8px;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.etiqueta {
    border: 2px solid black;
    padding: 15px;
    background: white;
    height: 350px;
}

.logo {
    width: 120px;
}

.awb {
    font-size: 40px;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
}

.sla {
    font-size: 18px;
    margin-top: 10px;
}

@media print {
    body * {
        visibility: hidden;
    }
    .container, .container * {
        visibility: visible;
    }
    .container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
    }
}
</style>
</head>

<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<input type="file" id="upload" accept="image/*" multiple>
<br>
<button onclick="processar()">Processar Fotos</button>
<button onclick="window.print()">Imprimir A4</button>

<div class="container" id="container"></div>

<script>

async function processar() {

    const files = document.getElementById('upload').files;
    if (files.length === 0) {
        alert("Selecione até 4 imagens");
        return;
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    for (let i = 0; i < files.length && i < 4; i++) {

        const file = files[i];

        const result = await Tesseract.recognize(file, 'por');
        const text = result.data.text;

        console.log("Texto OCR:", text);

        // Extrair somente números
        let numeros = text.replace(/\D/g, "");

        let awbFinal = "NÃO IDENTIFICADO";

        if (numeros.length >= 11) {

            // Remove os 3 primeiros dígitos (577)
            let semPrefixo = numeros.substring(3);

            // Pega os últimos 8 dígitos
            let ultimos8 = semPrefixo.slice(-8);

            // Se ficar com 7 dígitos, adiciona 0 no início
            if (ultimos8.length === 7) {
                ultimos8 = "0" + ultimos8;
            }

            awbFinal = ultimos8;
        }

        // Extrair data (prazo = SLA)
        const dataMatch = text.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{2,4}/);
        const sla = dataMatch ? dataMatch[0] : "DATA NÃO IDENTIFICADA";

        // Criar etiqueta
        const etiqueta = document.createElement("div");
        etiqueta.className = "etiqueta";

        etiqueta.innerHTML = `
            <img class="logo" src="logo-azulcargo.png">
            <div class="awb">${awbFinal}</div>
            <div class="sla">SLA: ${sla}</div>
            <div id="qr${i}" style="margin-top:15px;"></div>
        `;

        container.appendChild(etiqueta);

        if (awbFinal !== "NÃO IDENTIFICADO") {
            QRCode.toCanvas(
                document.getElementById(`qr${i}`),
                awbFinal
            );
        }
    }
}

</script>

</body>
</html>
