<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador 4 Etiquetas Azul</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f2f2f2;
}

button {
    padding: 8px 12px;
    margin-top: 8px;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.etiqueta {
    border: 2px solid black;
    padding: 15px;
    background: white;
    height: 350px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    width: 140px;
}

.awb {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}

.sla {
    font-size: 18px;
    text-align: center;
    margin-top: 10px;
}

.qr {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

@media print {
    body * {
        visibility: hidden;
    }
    .container, .container * {
        visibility: visible;
    }
    .container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
    }
}
</style>
</head>

<body>

<h2>Gerador 4 Etiquetas - Azul</h2>

<!-- Escolher da galeria -->
<input type="file" id="upload" accept="image/*" multiple>

<br><br>

<!-- Tirar foto direto da câmera -->
<input type="file" id="camera" accept="image/*" capture="environment" multiple>

<br>
<button onclick="processarArquivos()">Processar Imagens</button>
<button onclick="window.print()">Imprimir A4</button>

<div class="container" id="container"></div>

<script>

async function processarArquivos() {

    const arquivosGaleria = document.getElementById('upload').files;
    const arquivosCamera = document.getElementById('camera').files;

    const todosArquivos = [...arquivosGaleria, ...arquivosCamera];

    if (todosArquivos.length === 0) {
        alert("Selecione ou tire até 4 fotos");
        return;
    }

    if (todosArquivos.length > 4) {
        alert("Máximo permitido: 4 imagens");
        return;
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    for (let i = 0; i < todosArquivos.length; i++) {

        const file = todosArquivos[i];

        const result = await Tesseract.recognize(file, 'por');
        const text = result.data.text;

        console.log("Texto OCR:", text);

        // Extrair números
        let numeros = text.replace(/\D/g, "");

        let awbFinal = "NÃO IDENTIFICADO";

        if (numeros.length >= 11) {

            // Remove 577
            let semPrefixo = numeros.substring(3);

            let ultimos8 = semPrefixo.slice(-8);

            if (ultimos8.length === 7) {
                ultimos8 = "0" + ultimos8;
            }

            awbFinal = ultimos8;
        }

        // SLA = data encontrada
        const dataMatch = text.match(/\d{2}[\/\-.]\d{2}[\/\-.]\d{2,4}/);
        const sla = dataMatch ? dataMatch[0] : "DATA NÃO IDENTIFICADA";

        const etiqueta = document.createElement("div");
        etiqueta.className = "etiqueta";

        etiqueta.innerHTML = `
            <img class="logo" src="logo-azulcargo.png">
            <div class="awb">${awbFinal}</div>
            <div class="sla">SLA: ${sla}</div>
            <div class="qr" id="qr${i}"></div>
        `;

        container.appendChild(etiqueta);

        if (awbFinal !== "NÃO IDENTIFICADO") {
            QRCode.toCanvas(
                document.getElementById(`qr${i}`),
                awbFinal,
                { width: 90 }
            );
        }
    }
}

</script>

</body>
</html>
