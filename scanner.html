<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner AWB</title>
</head>

<body>

<h2>Leitura de AWB</h2>
<p>Bipe o código.</p>

<input id="scanner" autofocus style="opacity:0">

<script>

let buffer="";
let tempo=Date.now();

document.addEventListener("keydown",function(e){

let agora=Date.now();

if(agora-tempo>100){
buffer="";
}

tempo=agora;

if(e.key==="Enter"){

enviar(buffer);

buffer="";
return;

}

if(e.key.length===1){
buffer+=e.key;
}

});

function enviar(codigo){

fetch("https://script.google.com/macros/s/AKfycbyJ0oNKpgHADe7HCpHNzne5Zl_X5_CotWVXSKjT3lo0sfHzm1q2h65cmaP8Os0Oy3ZMWA/exec",{
method:"POST",
body:new URLSearchParams({codigo:codigo})
});

console.log("Enviado:",codigo);

}

</script>

</body>
</html>
